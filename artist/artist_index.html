<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aaron Ruddick</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/img/apple-touch-icon-180x180.png">
  <meta name="theme-color" content="#0b0b0c">

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b0b0c;
      color: #ffffff;
    }

    header {
      position: relative;
      height: 100vh;
      background: url("assets/img/Stir_My_Cup_Combined_Image.png") center center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    header::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 700px;
      padding: 20px;
    }

    .hero-content img {
      width: 120px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 42px;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .buttons a {
      display: inline-block;
      margin: 10px;
      padding: 14px 28px;
      border-radius: 30px;
      text-decoration: none;
      color: #fff;
      border: 1px solid #fff;
      transition: 0.3s;
    }

    .buttons a:hover {
      background: #ffffff;
      color: #000000;
    }

    section {
      padding: 80px 10%;
    }

    .video-wrapper {
      max-width: 900px;
      margin: auto;
    }

    video {
      width: 100%;
      height: auto;
      border-radius: 12px;
      object-fit: cover;
    }

    footer {
      text-align: center;
      padding: 40px 0;
      opacity: 0.6;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <div class="hero-content">
    <img src="assets/img/logo_primary_transparent.png" alt="Logo">
    <h1>AARON RUDDICK</h1>
    <div class="subtitle">Songs about memory, timing, and the space between words.</div>
    <div class="buttons">
      <a href="#music">Listen</a>
      <a href="#music">Watch</a>
    </div>
  </div>
</header>

<section id="music">
  <div class="video-wrapper">
    <video controls>
      <source src="assets/NewSongDemo.mov" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
</section>

<footer>
  © Aaron Ruddick
</footer>

</body>
</html>
